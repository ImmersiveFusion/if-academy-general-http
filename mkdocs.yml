# Conforms to SP-071 shared baseline (.context/current/work/spikes/SP-071-diataxis-docs-restructure/00-shared-baseline.md)
# Same plugin set, same theme features, same conventions as if-apm-documentation-http and the Knowledge Nexus.

# Project information
# site_name is the SHORT display label used in the sidebar nav and meta
# tags (sibling convention to the kids tier). The formal property name
# ("Immersive Fusion Academy") is preserved in copyright, license, and
# business artifacts; it does not need to be the visible nav label on every
# page. "IF General Academy" pairs with the kids tier's "IF Kids Academy".
site_name: IF General Academy
site_url: https://immersivefusion.academy
site_description: A small publication about AI, written for anyone, by an observability company.
site_author: Immersive Fusion LLC

# Local dev server bind address. Affects `mkdocs serve` only, not
# `mkdocs build` output. Override per-run with `mkdocs serve -a HOST:PORT`.
dev_addr: '127.0.0.1:8011'

# Repository
repo_name: if-academy-general-http
repo_url: https://github.com/ImmersiveFusion/if-academy-general-http
edit_uri: edit/main/docs

# Copyright / byline. Rendered by Material's partials/copyright.html inside
# the footer-meta block, then re-styled as a soft byline pill in
# docs/stylesheets/academy.css (sibling of the kids tier's footer pill).
# HTML is permitted here. Byline + license link + About link live here;
# Material appends its own "Made with Material for MkDocs" line below.
copyright: '<em>by Immersive Fusion.</em> Published under <a href="https://creativecommons.org/licenses/by-nc/4.0/" rel="license noopener">Creative Commons BY-NC 4.0</a> <span class="md-copyright__sep" aria-hidden="true">&middot;</span> <a href="/about/">About</a> <span class="md-copyright__sep" aria-hidden="true">&middot;</span> <a href="/how-this-is-made/">How this is made</a><br><span class="ac-sister-link">For a younger reader: <a href="https://kids.immersivefusion.academy">kids.immersivefusion.academy</a></span><br><span class="ac-trademark-notice">Mosey and Wobble are trademarks of Immersive Fusion LLC.</span>'

watch:
  - docs
  - overrides

# Configuration
theme:
  name: material
  custom_dir: overrides
  # Browser-tab favicon. The full icon family (apple-touch-icon,
  # web-app-manifest, theme-color meta) is wired via the {% block extrahead %}
  # in overrides/main.html. favicon assets land in docs/ with the brand
  # artwork; this points at the same favicon.ico filename the kids tier uses.
  favicon: favicon.ico
  # Header logo (top-left of every page). Without this, Material renders
  # its default fallback SVG. Points at the brand favicon-96x96.png the
  # kids tier also uses for its header logo; founder may switch this to
  # a tier-specific lockup later during the visual identity pass.
  logo: favicon-96x96.png
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.footer    # next/prev pager cards under each essay
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    # NOT navigation.indexes (section-index plugin owns section landing pages; see SP-071 baseline)
  palette:
    # Two schemes, sibling of the kids tier. Dark mode first (default) for
    # parity with the IF product docs (docs.immersivefusion.com is dark-first).
    # "academy-night" = deep indigo sky, lifted warm-dark cards, cyan accents
    # nodding to the product brand. Light mode = warm-cream publication page,
    # soft hill, navy ink. Both schemes' colors are defined in academy.css;
    # primary/accent here are nominal (academy.css overrides the md-* vars).
    - scheme: academy-night
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to day
    - scheme: default
      primary: white
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to night
  # Fonts are set by docs/stylesheets/academy.css (NYT-style editorial stack:
  # Source Serif 4 body, Playfair Display headlines, Inter for furniture,
  # JetBrains Mono code + lockup) and loaded via overrides/main.html.
  # Disabled here so Material does not also load Roboto from Google.
  font: false

extra_css:
  - stylesheets/academy.css

# Plugins: SP-071 shared baseline, identical set, identical order.
plugins:
  - search:
      separator: '[\s​\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - tags
  - awesome-pages
  - section-index
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
  - minify:
      minify_html: true
  - redirects:
      redirect_maps:
        # site-specific entries; starts empty, grows as content moves happen

# Markdown extensions
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true