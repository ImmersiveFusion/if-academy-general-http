# Conforms to SP-071 shared baseline (.context/current/work/spikes/SP-071-diataxis-docs-restructure/00-shared-baseline.md)
# Same plugin set, same theme features, same conventions as if-apm-documentation-http and the Knowledge Nexus.

# Project information
site_name: Immersive Fusion Academy
site_url: https://immersivefusion.academy
site_description: A small publication about AI, written for anyone, by an observability company.
site_author: Immersive Fusion LLC

# Repository
repo_name: if-academy-general-http
repo_url: https://github.com/ImmersiveFusion/if-academy-general-http
edit_uri: edit/main/docs

# Copyright
copyright: 'Copyright &copy; 2026 <a href="https://www.immersivefusion.com">Immersive Fusion LLC</a>. Published under <a href="https://creativecommons.org/licenses/by-nc/4.0/">Creative Commons Attribution-NonCommercial 4.0 International</a>.'

watch:
  - docs

# Configuration
theme:
  name: material
  features:
    # SP-071 shared core
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    # NOT navigation.indexes (section-index plugin owns section landing pages; see SP-071 baseline)
  palette:
    # Dark mode first (default)
    - scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Roboto
    code: Roboto Mono

# Plugins: SP-071 shared baseline, identical set, identical order.
plugins:
  - search:
      separator: '[\s​\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - tags
  - awesome-pages
  - section-index
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
  - minify:
      minify_html: true
  - redirects:
      redirect_maps:
        # site-specific entries; starts empty, grows as content moves happen

# Markdown extensions
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true